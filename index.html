<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turnos AP 2026 - v71</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

        /* Estilo de alerta roja: PT en semanas críticas */
        .text-alerta-roja { 
            color: #ef4444 !important; 
            font-weight: 900 !important; 
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
        }
        .dark .text-alerta-roja { color: #ff4d4d !important; }

        /* Colores de las tarjetas */
        .card-noche { background-color: #000000 !important; color: #ffffff !important; border: 1px solid #333 !important; }
        .card-pm { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .card-pt { background-color: #dcfce7; border: 1px solid #86efac; color: #166534; }
        .card-ptt { background-color: #15803d; border: 1px solid #14532d; color: #ffffff; }
        .card-cm { background-color: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; }
        .card-ct { background-color: #ffedd5; border: 1px solid #fdba74; color: #9a3412; }
        .card-ctt { background-color: #ea580c; border: 1px solid #9a3412; color: #ffffff; }
        .card-vaca { background-color: #fef9c3; border: 1px solid #fef08a; color: #854d0e; }
        .card-comp { background-color: #f3e8ff; border: 1px solid #e9d5ff; color: #6b21a8; }
        .card-default { background-color: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }

        .dark .card-pm:not(.card-noche) { background-color: #064e3b; color: #dcfce7; }
        .dark .card-pt:not(.card-noche) { background-color: #065f46; color: #dcfce7; }
        .dark .card-ptt:not(.card-noche) { background-color: #14532d; color: #ffffff; }
        .dark .card-cm:not(.card-noche) { background-color: #7c2d12; color: #ffedd5; }
        .dark .card-ct:not(.card-noche) { background-color: #9a3412; color: #ffedd5; }
        .dark .card-ctt:not(.card-noche) { background-color: #c2410c; color: #ffffff; }
        .dark .card-vaca { background-color: #713f12; color: #fef9c3; border-color: #854d0e; }

        .current-week-card { outline: 4px solid #3b82f6; outline-offset: 2px; position: relative; z-index: 20; }
        .current-week-card::after {
            content: 'HOY'; position: absolute; top: -10px; right: -10px; background: #3b82f6;
            color: white; font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 6px;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen pb-24">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border-b dark:border-darkBorder p-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                    <i class="fas fa-calendar-alt text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-sm font-extrabold uppercase tracking-tight text-slate-800 dark:text-white">Turnos AP 2026</h1>
                    <p class="text-[8px] font-bold text-indigo-500 leading-none uppercase">v71 - <span id="sync-status">INACTIVO</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 transition-all active:scale-90">
                    <i id="theme-icon" class="fas fa-moon text-indigo-600 dark:text-yellow-400 text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-3 py-4">
        <div id="upload-state" class="flex flex-col items-center text-center py-10 px-4 animate-fade-in">
            <div class="bg-white dark:bg-darkCard p-8 rounded-[2.5rem] shadow-xl border dark:border-darkBorder w-full max-w-md">
                <div class="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-file-excel text-2xl text-indigo-600 dark:text-indigo-400"></i>
                </div>
                <h3 class="font-black text-slate-800 dark:text-white uppercase text-lg">Subir Excel</h3>
                <p class="text-xs text-slate-500 mt-2 mb-8 italic">Selecciona el archivo para cargar todos los turnos del año</p>
                <input type="file" id="file-input" class="hidden" accept=".xlsx">
                <button onclick="document.getElementById('file-input').click()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    Seleccionar Archivo
                </button>
            </div>
        </div>

        <div id="selector-container" class="mb-6 hidden animate-fade-in">
            <div class="flex justify-between items-center mb-2 px-1">
                <label class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Usuario</label>
                <button onclick="resetApp()" class="text-[9px] font-bold text-red-400 uppercase">Reiniciar</button>
            </div>
            <select id="user-selector" class="w-full bg-white dark:bg-darkCard border-2 border-slate-200 dark:border-darkBorder rounded-2xl px-5 py-4 font-bold shadow-lg dark:text-white appearance-none text-lg outline-none focus:border-indigo-500 transition-colors">
                <option value="">ELIJE TU NOMBRE</option>
            </select>
        </div>

        <div id="dashboard" class="hidden space-y-4 animate-fade-in">
            <!-- Estadísticas rápidas -->
            <div class="bg-white dark:bg-darkCard p-6 rounded-[2.5rem] shadow-sm border dark:border-darkBorder">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="view-title" class="text-4xl font-black uppercase tracking-tighter text-slate-800 dark:text-white">---</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Semana Actual: <span id="cur-week-span" class="text-indigo-600 dark:text-indigo-400 font-black">--</span></p>
                        </div>
                    </div>
                    <button onclick="scrollToCurrentWeek()" class="bg-indigo-600 text-white text-[10px] px-6 py-3 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-transform">
                        IR A HOY
                    </button>
                </div>

                <div id="stats-summary" class="grid grid-cols-2 gap-3">
                    <div class="bg-emerald-50 dark:bg-emerald-900/20 p-4 rounded-3xl border border-emerald-100 dark:border-emerald-800/30">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fas fa-sun text-emerald-500 text-[10px]"></i>
                            <span class="text-[9px] font-black text-emerald-600/70 dark:text-emerald-400/70 uppercase">Mañanas</span>
                        </div>
                        <p id="count-m" class="text-3xl font-black text-emerald-700 dark:text-emerald-300">0</p>
                    </div>
                    <div class="bg-orange-50 dark:bg-orange-900/20 p-4 rounded-3xl border border-orange-100 dark:border-orange-800/30">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fas fa-cloud-sun text-orange-500 text-[10px]"></i>
                            <span class="text-[9px] font-black text-orange-600/70 dark:text-orange-400/70 uppercase">Tardes</span>
                        </div>
                        <p id="count-t" class="text-3xl font-black text-orange-700 dark:text-orange-300">0</p>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fas fa-moon text-indigo-400 text-[10px]"></i>
                            <span class="text-[9px] font-black text-slate-400 uppercase">Noches</span>
                        </div>
                        <p id="count-n" class="text-3xl font-black text-white">0</p>
                    </div>
                    <div class="bg-amber-50 dark:bg-amber-900/20 p-4 rounded-3xl border border-amber-100 dark:border-amber-800/30">
                        <div class="flex items-center gap-2 mb-1">
                            <i class="fas fa-umbrella-beach text-amber-500 text-[10px]"></i>
                            <span class="text-[9px] font-black text-amber-600/70 dark:text-amber-400/70 uppercase">Vaca/H/E</span>
                        </div>
                        <p id="count-v" class="text-3xl font-black text-amber-700 dark:text-amber-300">0</p>
                    </div>
                </div>
            </div>

            <div id="wrapper_turnos" class="grid grid-cols-3 gap-3"></div>
        </div>
    </main>

    <script>
        const SHIFT_STYLES = {
            'PM': 'card-pm', 'PT': 'card-pt', 'PTT': 'card-ptt',
            'CM': 'card-cm', 'CT': 'card-ct', 'CTT': 'card-ctt',
            'V': 'card-vaca', 'H': 'card-comp', 'E': 'card-comp'
        };

        const TARGET_NAMES = ["ANGY", "PACO", "IVAN", "JEAN", "NATALIA", "LUIS", "ALBERTO", "ENZO"];
        const MONTH_NAMES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

        let db = [];

        function getWeekNumber() {
            const d = new Date();
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        function getMonthFromWeek(week) {
            const date = new Date(2026, 0, 1);
            date.setDate(date.getDate() + (week - 1) * 7 + 3);
            return MONTH_NAMES[date.getMonth()];
        }
        
        const CURRENT_WEEK = getWeekNumber();

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => syncData(ev.target.result);
            reader.readAsArrayBuffer(file);
        });

        function syncData(buffer) {
            try {
                const data = new Uint8Array(buffer);
                const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
                const sheetName = workbook.SheetNames.find(n => n.includes("2026")) || workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const range = XLSX.utils.decode_range(sheet['!ref']);
                
                let globalWeekMap = {};
                for (let r = range.s.r; r <= range.e.r; r++) {
                    for (let c = range.s.c; c <= range.e.c; c++) {
                        const cell = sheet[XLSX.utils.encode_cell({r: r, c: c})];
                        if (cell && cell.v !== undefined && !isNaN(parseInt(cell.v))) {
                            const val = parseInt(cell.v);
                            if (val >= 1 && val <= 53) {
                                if (!globalWeekMap[val]) globalWeekMap[val] = [];
                                globalWeekMap[val].push({ r, c });
                            }
                        }
                    }
                }

                let userRowMap = {};
                TARGET_NAMES.forEach(name => {
                    userRowMap[name] = [];
                    for (let r = range.s.r; r <= range.e.r; r++) {
                        const c0 = sheet[XLSX.utils.encode_cell({r: r, c: 0})];
                        const c1 = sheet[XLSX.utils.encode_cell({r: r, c: 1})];
                        if ((c0 && String(c0.v).toUpperCase().includes(name)) ||
                            (c1 && String(c1.v).toUpperCase().includes(name))) {
                            userRowMap[name].push(r);
                        }
                    }
                });

                let syncResults = [];

                TARGET_NAMES.forEach(targetName => {
                    const userRows = userRowMap[targetName];

                    for (let w = 1; w <= 53; w++) {
                        let finalCode = "S/T";
                        let finalNote = null;
                        let isAlert = false;
                        const weekPositions = globalWeekMap[w] || [];
                        
                        for (let pos of weekPositions) {
                            let staffCount = 0;
                            for (let r_check = pos.r + 1; r_check <= pos.r + 12; r_check++) {
                                const cell_check = sheet[XLSX.utils.encode_cell({r: r_check, c: pos.c})];
                                if (cell_check && cell_check.v !== undefined) {
                                    const v = parseInt(cell_check.v);
                                    if (v >= 5 && v <= 8) {
                                        staffCount = v;
                                        break;
                                    }
                                }
                            }

                            let closestRow = -1;
                            let minDistance = 999;
                            for (let r of userRows) {
                                let dist = Math.abs(r - pos.r);
                                if (dist < minDistance && dist < 50) { 
                                    minDistance = dist;
                                    closestRow = r;
                                }
                            }

                            if (closestRow !== -1) {
                                const cell = sheet[XLSX.utils.encode_cell({r: closestRow, c: pos.c})];
                                if (cell && cell.v !== undefined) {
                                    const rawVal = String(cell.v).trim().toUpperCase();
                                    
                                    if (rawVal !== "" && rawVal !== "0" && isNaN(rawVal) && !TARGET_NAMES.includes(rawVal)) {
                                        finalCode = rawVal;
                                        
                                        if (rawVal === "PT" && (staffCount === 6 || staffCount === 7)) {
                                            isAlert = true;
                                        }

                                        if (rawVal.includes('+') || rawVal.includes('*')) isAlert = true;
                                        if (cell.s && cell.s.font && cell.s.font.color) {
                                            const rgb = cell.s.font.color.rgb;
                                            if (rgb && (rgb.startsWith('FF00') || rgb.includes('C00000'))) isAlert = true;
                                        }

                                        if (cell.c && cell.c.length > 0) finalNote = cell.c[0].t.trim();
                                        break;
                                    }
                                }
                            }
                            if (finalCode !== "S/T") break;
                        }
                        syncResults.push({ user: targetName, week: w, code: finalCode, note: finalNote, alert: isAlert });
                    }
                });

                if (syncResults.length > 0) {
                    db = syncResults;
                    localStorage.setItem('sync_turnosap_v70', JSON.stringify(db));
                    document.getElementById('sync-status').textContent = "CONECTADO";
                    renderUI();
                }
            } catch (err) { alert("Error al leer el archivo: " + err.message); }
        }

        function renderUI() {
            document.getElementById('upload-state').classList.add('hidden');
            const selector = document.getElementById('user-selector');
            const saved = localStorage.getItem('turnosap_user_pref');
            const usersInDb = [...new Set(db.map(x => x.user))];
            
            selector.innerHTML = '<option value="">ELIJE TU NOMBRE</option>';
            usersInDb.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u; opt.textContent = u;
                if (u === saved) opt.selected = true;
                selector.appendChild(opt);
            });
            
            document.getElementById('selector-container').classList.remove('hidden');
            if (saved) loadDashboard(saved);
        }

        document.getElementById('user-selector').addEventListener('change', (e) => {
            if (!e.target.value) return;
            localStorage.setItem('turnosap_user_pref', e.target.value);
            loadDashboard(e.target.value);
        });

        function loadDashboard(user) {
            const myShifts = db.filter(s => s.user === user).sort((a,b) => a.week - b.week);
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('view-title').textContent = user;
            document.getElementById('cur-week-span').textContent = CURRENT_WEEK;

            const stats = { m:0, t:0, n:0, v:0 };
            const wrapper = document.getElementById('wrapper_turnos');
            wrapper.innerHTML = '';

            myShifts.forEach(t => {
                const isEmpty = t.code === "S/T";
                const isNoche = !isEmpty && t.code.endsWith('.');
                const baseCode = isNoche ? t.code.slice(0, -1) : t.code;
                
                if (!isEmpty) {
                    if (t.code.includes('V') || t.code.includes('H') || t.code.includes('E')) stats.v++;
                    else if (isNoche) stats.n++;
                    else if (t.code.includes('M')) stats.m++;
                    else if (t.code.includes('T')) stats.t++;
                }

                let styleClass = isEmpty ? 'bg-slate-100 dark:bg-slate-800/50 opacity-30 grayscale' : (SHIFT_STYLES[baseCode] || 'card-default');
                if (isNoche) styleClass += ' card-noche';
                
                const card = document.createElement('div');
                const isCurrent = t.week === CURRENT_WEEK;
                const monthName = getMonthFromWeek(t.week);
                const textClass = t.alert ? 'text-alerta-roja' : '';

                card.className = `${styleClass} ${isCurrent ? 'current-week-card scale-105 shadow-xl' : ''} flex flex-col items-center justify-center py-6 px-1 rounded-[2.5rem] relative animate-fade-in transition-transform active:scale-95 cursor-pointer`;
                
                const noteBadge = t.note ? `<div class="mt-2 bg-black/10 dark:bg-white/10 px-3 py-1 rounded-full"><span class="text-[7px] font-black uppercase tracking-tighter text-slate-700 dark:text-white">NOTAS</span></div>` : '';

                card.innerHTML = `
                    <span class="text-[8px] font-black opacity-40 uppercase mb-0.5">${monthName}</span>
                    <span class="text-[10px] font-extrabold opacity-20 uppercase mb-1">Sem. ${t.week}</span>
                    <span class="text-2xl font-black tracking-tighter ${textClass}">${isEmpty ? '---' : t.code}</span>
                    ${noteBadge}
                `;

                card.onclick = () => {
                    let msg = `SEMANA ${t.week}`;
                    if (t.note) msg += `\n\n📝 NOTA DEL EXCEL:\n${t.note}`;
                    
                    if (t.note) alert(msg);
                };
                wrapper.appendChild(card);
            });

            document.getElementById('count-m').textContent = stats.m;
            document.getElementById('count-t').textContent = stats.t;
            document.getElementById('count-n').textContent = stats.n;
            document.getElementById('count-v').textContent = stats.v;
            scrollToCurrentWeek();
        }

        function scrollToCurrentWeek() {
            setTimeout(() => {
                const target = document.querySelector('.current-week-card');
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function resetApp() {
            if(confirm("¿Seguro que quieres borrar todo y empezar de cero?")) {
                localStorage.clear();
                location.reload();
            }
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-indigo-600';
        }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();
            const savedData = localStorage.getItem('sync_turnosap_v70');
            if (savedData) {
                db = JSON.parse(savedData);
                document.getElementById('sync-status').textContent = "CONECTADO";
                renderUI();
            }
        };
    </script>
</body>
</html>
