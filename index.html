
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística 2026 - v61</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

        /* Clase para turnos marcados en rojo en el Excel */
        .card-rojo { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #991b1b !important; }
        .dark .card-rojo { background-color: #450a0a !important; border: 2px solid #f87171 !important; color: #fecaca !important; }
        
        .card-noche { background-color: #000000 !important; color: #ffffff !important; border: 1px solid #333 !important; }
        .dark .card-noche { border-color: #444 !important; }

        .card-pm { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .card-pt { background-color: #dcfce7; border: 1px solid #86efac; color: #166534; }
        .card-ptt { background-color: #15803d; border: 1px solid #14532d; color: #ffffff; }
        
        .card-cm { background-color: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; }
        .card-ct { background-color: #ffedd5; border: 1px solid #fdba74; color: #9a3412; }
        .card-ctt { background-color: #ea580c; border: 1px solid #9a3412; color: #ffffff; }
        
        .card-vaca { background-color: #fef9c3; border: 1px solid #fef08a; color: #854d0e; }
        .card-comp { background-color: #f3e8ff; border: 1px solid #e9d5ff; color: #6b21a8; }
        .card-default { background-color: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }

        .dark .card-pm:not(.card-noche):not(.card-rojo) { background-color: #064e3b; color: #dcfce7; }
        .dark .card-pt:not(.card-noche):not(.card-rojo) { background-color: #065f46; color: #dcfce7; }
        .dark .card-ptt:not(.card-noche):not(.card-rojo) { background-color: #14532d; color: #ffffff; }
        .dark .card-cm:not(.card-noche):not(.card-rojo) { background-color: #7c2d12; color: #ffedd5; }
        .dark .card-ct:not(.card-noche):not(.card-rojo) { background-color: #9a3412; color: #ffedd5; }
        .dark .card-ctt:not(.card-noche):not(.card-rojo) { background-color: #c2410c; color: #ffffff; }
        .dark .card-vaca { background-color: #713f12; color: #fef9c3; border-color: #854d0e; }

        .current-week-card { outline: 4px solid #3b82f6; outline-offset: 2px; position: relative; z-index: 20; }
        .current-week-card::after {
            content: 'HOY'; position: absolute; top: -10px; right: -10px; background: #3b82f6;
            color: white; font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen pb-24">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border-b dark:border-darkBorder p-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                    <i class="fas fa-sync-alt text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-sm font-extrabold uppercase tracking-tight text-slate-800 dark:text-white">Sincro Turnos 2026</h1>
                    <p class="text-[8px] font-bold text-indigo-500 leading-none">ESTADO: <span id="sync-status">ESPERANDO</span></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 transition-all active:scale-90">
                    <i id="theme-icon" class="fas fa-moon text-indigo-600 dark:text-yellow-400 text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-3 py-4">
        
        <div id="upload-state" class="flex flex-col items-center text-center py-10 px-4 animate-fade-in">
            <div class="bg-white dark:bg-darkCard p-8 rounded-[2.5rem] shadow-xl border dark:border-darkBorder w-full max-w-md">
                <div class="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-cloud-upload-alt text-2xl text-indigo-600 dark:text-indigo-400"></i>
                </div>
                <h3 class="font-black text-slate-800 dark:text-white uppercase text-lg">Sincronizar Excel</h3>
                <p class="text-xs text-slate-500 mt-2 mb-8 text-balance italic">Selecciona el archivo "Turnos AP 2026.xlsx"</p>
                <input type="file" id="file-input" class="hidden" accept=".xlsx">
                <button onclick="document.getElementById('file-input').click()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    Abrir Archivo
                </button>
            </div>
        </div>

        <div id="selector-container" class="mb-6 hidden animate-fade-in">
            <div class="flex justify-between items-center mb-2 px-1">
                <label class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Empleado Sincronizado</label>
                <button onclick="resetApp()" class="text-[9px] font-bold text-red-400 uppercase">Cambiar archivo</button>
            </div>
            <select id="user-selector" class="w-full bg-white dark:bg-darkCard border-2 border-slate-200 dark:border-darkBorder rounded-2xl px-5 py-4 font-bold shadow-lg dark:text-white appearance-none text-lg outline-none focus:border-indigo-500 transition-colors">
                <option value="">CARGANDO LISTA...</option>
            </select>
        </div>

        <div id="dashboard" class="hidden space-y-4 animate-fade-in">
            <div class="bg-white dark:bg-darkCard p-5 rounded-3xl shadow-sm border dark:border-darkBorder">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="view-title" class="text-3xl font-black uppercase leading-none tracking-tighter text-slate-800 dark:text-white">---</h2>
                        <p class="text-[10px] font-bold text-slate-500 mt-2 uppercase">SEMANA ACTUAL: <span id="cur-week-span" class="text-indigo-600 dark:text-indigo-400 font-black">--</span></p>
                    </div>
                    <button onclick="scrollToCurrentWeek()" class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300 text-[10px] px-4 py-2 rounded-full font-black uppercase">
                        Ver Hoy
                    </button>
                </div>

                <div id="stats-summary" class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t dark:border-darkBorder text-center">
                    <div><p class="text-[7px] font-bold text-slate-400 uppercase">M</p><p id="count-m" class="text-xs font-black">0</p></div>
                    <div><p class="text-[7px] font-bold text-slate-400 uppercase">T</p><p id="count-t" class="text-xs font-black">0</p></div>
                    <div><p class="text-[7px] font-bold text-slate-400 uppercase">N</p><p id="count-n" class="text-xs font-black">0</p></div>
                    <div><p class="text-[7px] font-bold text-slate-400 uppercase">V/H</p><p id="count-v" class="text-xs font-black">0</p></div>
                </div>
            </div>

            <div id="wrapper_turnos" class="grid grid-cols-3 gap-3"></div>
        </div>
    </main>

    <footer id="quick-nav" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-2">
        <button onclick="scrollToCurrentWeek()" class="bg-indigo-600 text-white px-6 py-3 rounded-full font-black shadow-2xl text-[10px] uppercase tracking-widest flex items-center gap-2">
            <i class="fas fa-calendar-day"></i> IR A HOY
        </button>
    </footer>

    <script>
        const SHIFT_STYLES = {
            'PM': 'card-pm', 'PT': 'card-pt', 'PTT': 'card-ptt',
            'CM': 'card-cm', 'CT': 'card-ct', 'CTT': 'card-ctt',
            'V': 'card-vaca', 'H': 'card-comp', 'E': 'card-comp'
        };

        const TARGET_NAMES = ["ANGY", "PACO", "IVAN", "JEAN", "NATALIA", "LUIS", "ALBERTO", "ENZO"];

        let db = [];

        function getWeekNumber() {
            const d = new Date();
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }
        
        const CURRENT_WEEK = getWeekNumber();

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => syncData(ev.target.result);
            reader.readAsArrayBuffer(file);
        });

        function syncData(buffer) {
            try {
                const data = new Uint8Array(buffer);
                const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
                const sheetName = workbook.SheetNames.find(n => n.includes("2026")) || workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const range = XLSX.utils.decode_range(sheet['!ref']);
                
                let globalWeekMap = {}; 
                for (let r = range.s.r; r <= range.e.r; r++) {
                    for (let c = range.s.c; c <= range.e.c; c++) {
                        const cell = sheet[XLSX.utils.encode_cell({r: r, c: c})];
                        if (cell && cell.v !== undefined && !isNaN(parseInt(cell.v))) {
                            const val = parseInt(cell.v);
                            if (val >= 1 && val <= 53) {
                                if (!globalWeekMap[val]) globalWeekMap[val] = [];
                                globalWeekMap[val].push({ r, c });
                            }
                        }
                    }
                }

                let syncResults = [];

                TARGET_NAMES.forEach(targetName => {
                    let userRows = [];
                    for (let r = range.s.r; r <= range.e.r; r++) {
                        const c0 = sheet[XLSX.utils.encode_cell({r: r, c: 0})];
                        const c1 = sheet[XLSX.utils.encode_cell({r: r, c: 1})];
                        const c2 = sheet[XLSX.utils.encode_cell({r: r, c: 2})];
                        if ((c0 && String(c0.v).trim().toUpperCase() === targetName) || 
                            (c1 && String(c1.v).trim().toUpperCase() === targetName) ||
                            (c2 && String(c2.v).trim().toUpperCase() === targetName)) {
                            userRows.push(r);
                        }
                    }

                    if (userRows.length === 0) return;

                    for (let w = 1; w <= 53; w++) {
                        let finalCode = "S/T";
                        let finalNote = null;
                        let finalRed = false;
                        const weekPositions = globalWeekMap[w] || [];
                        
                        for (let pos of weekPositions) {
                            for (let r of userRows) {
                                if (Math.abs(r - pos.r) < 15) {
                                    const cell = sheet[XLSX.utils.encode_cell({r: r, c: pos.c})];
                                    if (cell && cell.v !== undefined) {
                                        const rawVal = String(cell.v).trim().toUpperCase();
                                        if (rawVal !== "" && rawVal !== "0" && isNaN(rawVal) && !TARGET_NAMES.includes(rawVal)) {
                                            finalCode = rawVal;
                                            finalNote = (cell.c && cell.c.length > 0) ? cell.c[0].t : null;
                                            
                                            // Detección de color ROJO en la celda
                                            if (cell.s && cell.s.font && cell.s.font.color) {
                                                const rgb = cell.s.font.color.rgb;
                                                // Chequeamos variaciones comunes de rojo en Excel
                                                if (rgb === 'FFFF0000' || rgb === 'FF0000' || rgb === 'FFC00000') {
                                                    finalRed = true;
                                                }
                                            }
                                            break;
                                        }
                                    }
                                }
                            }
                            if (finalCode !== "S/T") break;
                        }

                        syncResults.push({ user: targetName, week: w, code: finalCode, note: finalNote, red: finalRed });
                    }
                });

                if (syncResults.length > 0) {
                    db = syncResults;
                    localStorage.setItem('sync_logistica_v61', JSON.stringify(db));
                    document.getElementById('sync-status').textContent = "SINCRONIZADO";
                    document.getElementById('sync-status').className = "text-green-500 font-black";
                    renderUI();
                } else {
                    alert("No se pudo extraer información.");
                }
            } catch (err) {
                console.error(err);
                alert("Error de lectura: " + err.message);
            }
        }

        function renderUI() {
            document.getElementById('upload-state').classList.add('hidden');
            const selector = document.getElementById('user-selector');
            const usersInDb = [...new Set(db.map(x => x.user))];
            const saved = localStorage.getItem('logistica_user_pref');
            selector.innerHTML = '<option value="">SELECCIONA TU NOMBRE</option>';
            TARGET_NAMES.forEach(u => {
                if (usersInDb.includes(u)) {
                    const opt = document.createElement('option');
                    opt.value = u; opt.textContent = u;
                    if (u === saved) opt.selected = true;
                    selector.appendChild(opt);
                }
            });
            document.getElementById('selector-container').classList.remove('hidden');
            document.getElementById('quick-nav').classList.remove('hidden');
            if (saved && usersInDb.includes(saved)) loadDashboard(saved);
        }

        document.getElementById('user-selector').addEventListener('change', (e) => {
            if (!e.target.value) return;
            localStorage.setItem('logistica_user_pref', e.target.value);
            loadDashboard(e.target.value);
        });

        function loadDashboard(user) {
            const myShifts = db.filter(s => s.user === user).sort((a,b) => a.week - b.week);
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('view-title').textContent = user;
            document.getElementById('cur-week-span').textContent = CURRENT_WEEK;

            const stats = { m:0, t:0, n:0, v:0 };
            const wrapper = document.getElementById('wrapper_turnos');
            wrapper.innerHTML = '';

            myShifts.forEach(t => {
                const isEmpty = t.code === "S/T";
                const isNoche = !isEmpty && t.code.endsWith('.');
                const baseCode = isNoche ? t.code.slice(0, -1) : t.code;
                
                if (!isEmpty) {
                    if (t.code.includes('V') || t.code.includes('H')) stats.v++;
                    else if (isNoche) stats.n++;
                    else if (t.code.includes('M')) stats.m++;
                    else if (t.code.includes('T')) stats.t++;
                }

                // Lógica de estilo: Si red es true, forzamos card-rojo
                let style = isEmpty ? 'bg-slate-100 dark:bg-slate-800/50 opacity-30 grayscale' : (SHIFT_STYLES[baseCode] || 'card-default');
                if (isNoche) style += ' card-noche';
                if (t.red) style = 'card-rojo';

                const card = document.createElement('div');
                const isCurrent = t.week === CURRENT_WEEK;
                card.className = `${style} ${isCurrent ? 'current-week-card scale-105 shadow-xl' : ''} flex flex-col items-center justify-center py-6 px-2 rounded-[2rem] relative animate-fade-in transition-transform active:scale-95`;
                
                card.innerHTML = `
                    <span class="text-[8px] font-black opacity-30 uppercase mb-1">Sem. ${t.week}</span>
                    <span class="text-2xl font-black tracking-tighter">${isEmpty ? '---' : t.code}</span>
                    ${t.note ? '<i class="fas fa-sticky-note absolute top-3 right-3 text-[10px] opacity-40"></i>' : ''}
                `;

                if(t.note) card.onclick = () => alert(`NOTA SEMANA ${t.week}:\n${t.note}`);
                wrapper.appendChild(card);
            });

            document.getElementById('count-m').textContent = stats.m;
            document.getElementById('count-t').textContent = stats.t;
            document.getElementById('count-n').textContent = stats.n;
            document.getElementById('count-v').textContent = stats.v;
            scrollToCurrentWeek();
        }

        function scrollToCurrentWeek() {
            setTimeout(() => {
                const target = document.querySelector('.current-week-card');
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function resetApp() {
            if(confirm("¿Sincronizar un nuevo archivo?")) {
                localStorage.clear();
                location.reload();
            }
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-indigo-600';
        }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();
            const savedData = localStorage.getItem('sync_logistica_v61');
            if (savedData) {
                db = JSON.parse(savedData);
                document.getElementById('sync-status').textContent = "SINCRONIZADO";
                renderUI();
            }
        };
    </script>
</body>
</html>
